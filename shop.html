<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Speed Cycle Shop</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="banner">
        <video autoplay loop muted playsinline>
            <source src="images/CYCLING CINEMATIC VIDEO  I GH5.mp4" type="video/mp4">
        </video>
        <div class="navbar">
            <img class="logo" src="images/logo.png" alt="Logo">
            <div class="hamburger">☰</div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contacts</a></li>
                <li><a href="shop.html" class="active">Shop</a></li>
            </ul>
        </div>
        <div class="content">
            <h1>BUILD THE BIKE OF YOUR DREAMS</h1>
            <p>Custom-built bikes designed just for you.</p>
        </div>
    </div>

    <div class="shop">
        <h1>Our Bike Shop</h1>
        <div class="product-grid">
            <div class="product-card">
                <img src="images/bike1.jpg" alt="Road Bike">
                <h2>Road Bike</h2>
                <p>Lightweight, perfect for speed and agility.</p>
                <button class="cart-button">🛒 Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="images/bike2.jpg" alt="Mountain Bike">
                <h2>Mountain Bike</h2>
                <p>Durable and built for rugged terrain.</p>
                <button class="cart-button">🛒 Add to Cart</button>
            </div>
            <div class="product-card">
                <img src="images/bike3.jpg" alt="Electric Bike">
                <h2>Fixed Gear Bike</h2>
                <p>One speed bike built for cruising.</p>
                <button class="cart-button">🛒 Add to Cart</button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
